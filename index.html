<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanquo 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        model-viewer { width: 100%; height: 100vh; background-color: #ffffff; --poster-color: transparent; }
        #ar-button { background-color: #007AFF; border-radius: 8px; border: none; position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); padding: 12px 24px; color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <model-viewer id="sanquo-viewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls touch-action="pan-y" shadow-intensity="1" auto-rotate>
        <button slot="ar-button" id="ar-button">View in AR</button>
    </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // Your Swift code sends the link via the 'src' parameter
        const modelUrl = urlParams.get('src');
        
        if (modelUrl) {
            document.getElementById('sanquo-viewer').src = modelUrl;
        } else {
            console.error("No model URL provided in the 'src' parameter.");
        }
    </script>
</body>
</html>
