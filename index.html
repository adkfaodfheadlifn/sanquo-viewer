<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanquo 3D Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { --sanquo-blue: #007AFF; --ios-bg: #ffffff; }
        body { margin: 0; background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* The 3D Canvas */
        model-viewer { width: 100%; height: 100vh; background-color: var(--ios-bg); --poster-color: transparent; }

        /* Centered Loading Container */
        #loader-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; transition: opacity 0.5s ease; }

        /* Apple-style Spinner */
        .spinner { width: 36px; height: 36px; border: 3px solid #f3f3f3; border-top: 3px solid var(--sanquo-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }

        #status-text { color: #8E8E93; font-size: 14px; font-weight: 500; text-align: center; line-height: 1.4; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Utility classes */
        .hidden { opacity: 0; pointer-events: none; }
        #debug-log { position: absolute; bottom: 10px; font-size: 9px; color: #d1d1d6; text-align: center; width: 100%; font-family: monospace; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div id="status-text">Initializing Sanquo Viewer...</div>
    </div>

    <model-viewer id="viewer" 
                  ar 
                  ar-modes="webxr scene-viewer quick-look" 
                  camera-controls 
                  shadow-intensity="1" 
                  auto-rotate 
                  touch-action="pan-y">
    </model-viewer>
    
    <div id="debug-log"></div>

    <script>
        const log = (msg) => { document.getElementById('debug-log').innerText = msg; console.log(msg); };
        const urlParams = new URLSearchParams(window.location.search);
        const viewer = document.getElementById('viewer');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader-container');

        // 1. Extract the 'src' from the URL (handles encoded characters automatically)
        const rawSrc = urlParams.get('src') || urlParams.get('url');

        if (rawSrc) {
            // 2. Clean Regex: Extracts exactly 25+ characters for the File ID, ignoring prefixes like %3D
            const idMatch = rawSrc.match(/[-\w]{25,}/);
            
            if (idMatch) {
                const fileId = idMatch[0];
                log("Sanquo ID: " + fileId);
                
                // 3. Bypass 'Large File' warning using the 2026 direct usercontent endpoint
            const directLink = `https://docs.google.com/uc?export=download&id=${fileId}`;                
            
                statusText.innerText = "Downloading Structural Model...";
                viewer.src = directLink;

                // 4. Track Progress
                viewer.addEventListener('progress', (event) => {
                    const percent = Math.round(event.detail.totalProgress * 100);
                    if (percent > 0) statusText.innerText = `Loading: ${percent}%`;
                });

                // 5. Success
                viewer.addEventListener('load', () => {
                    loader.classList.add('hidden');
                    log("Render Complete");
                });

                // 6. Error Handling
                viewer.addEventListener('error', (e) => {
                    statusText.innerText = "Access Denied\nMake sure the file is PUBLIC.";
                    statusText.style.color = "#FF3B30"; // iOS Red
                    document.querySelector('.spinner').style.display = 'none';
                    log("Error: Data unreadable");
                });
            } else {
                statusText.innerText = "Invalid Model Link";
                log("Error: No valid ID found");
            }
        } else {
            statusText.innerText = "No Model Detected\nPlease scan a Sanquo Quote PDF";
            document.querySelector('.spinner').style.display = 'none';
        }
    </script>
</body>
</html>
