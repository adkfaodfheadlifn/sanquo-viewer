<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanquo 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #ffffff; --poster-color: transparent; }
        #loader { position: absolute; text-align: center; z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007AFF; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #debug-log { position: absolute; bottom: 10px; left: 10px; right: 10px; font-size: 10px; color: #888; text-align: center; max-height: 50px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="status">Initializing Sanquo Viewer...</div>
    </div>

    <model-viewer id="viewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate></model-viewer>
    
    <div id="debug-log"></div>

    <script>
        const log = (msg) => { document.getElementById('debug-log').innerText += "\n" + msg; console.log(msg); };
        const urlParams = new URLSearchParams(window.location.search);
        const fileIdMatch = window.location.search.match(/[-\w]{25,}/);
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        if (fileIdMatch) {
            const fileId = fileIdMatch[0];
            log("File ID Found: " + fileId);
            
            // TRY ALTERNATIVE ENDPOINT (Better for 2026)
            const directLink = `https://docs.google.com/uc?export=download&id=${fileId}&confirm=t`;
            viewer.src = directLink;

            viewer.addEventListener('progress', (e) => {
                const p = Math.round(e.detail.totalProgress * 100);
                status.innerText = `Downloading Model: ${p}%`;
            });

            viewer.addEventListener('load', () => {
                log("Success: Model fully rendered.");
                document.getElementById('loader').style.display = 'none';
            });

            viewer.addEventListener('error', (e) => {
                log("Error: Model-viewer could not parse the data.");
                status.innerText = "Error Loading 3D Data";
                status.style.color = "red";
            });
        } else {
            status.innerText = "No model ID detected. Scan PDF again.";
        }
    </script>
</body>
</html>
