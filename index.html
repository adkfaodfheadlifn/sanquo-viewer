<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanquo 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --sanquo-blue: #007AFF; }
        body { margin: 0; background-color: #ffffff; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* The 3D Canvas */
        model-viewer { width: 100%; height: 100vh; background-color: #ffffff; --poster-color: transparent; }

        /* Centered Loading Container */
        #loader-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }

        /* Apple-style Spinner */
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--sanquo-blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }

        #status-text { color: #8E8E93; font-size: 14px; font-weight: 500; text-align: center; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Hidden class for when loading finishes */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div id="status-text">Connecting to Sanquo Cloud...</div>
    </div>

    <model-viewer id="viewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate>
        <button slot="ar-button" style="display:none;"></button> </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('src');
        const viewer = document.getElementById('viewer');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader-container');

        if (rawUrl) {
            // 1. Extract File ID
            const fileIdMatch = rawUrl.match(/[-\w]{25,}/);
            if (fileIdMatch) {
                const fileId = fileIdMatch[0];
                // 2. Bypass Google's "Too Large to Scan" warning page
                const directLink = `https://drive.usercontent.google.com/download?export=download&id=${fileId}&confirm=t`;
                
                statusText.innerText = "Downloading Structural Model...";
                viewer.src = directLink;

                // 3. Track Progress
                viewer.addEventListener('progress', (event) => {
                    const percent = Math.round(event.detail.totalProgress * 100);
                    if (percent > 0) statusText.innerText = `Loading: ${percent}%`;
                });

                // 4. Handle Success
                viewer.addEventListener('load', () => {
                    loader.classList.add('hidden'); // Hide the loader entirely
                });

                // 5. Handle Errors
                viewer.addEventListener('error', (e) => {
                    statusText.innerText = "Error: File is Private or Expired";
                    statusText.style.color = "#FF3B30";
                    document.querySelector('.spinner').classList.add('hidden');
                    console.error("Model Viewer Error:", e);
                });
            }
        } else {
            statusText.innerText = "No Model Detected.\nPlease scan a Sanquo Quote PDF.";
            document.querySelector('.spinner').classList.add('hidden');
        }
    </script>
</body>
</html>
