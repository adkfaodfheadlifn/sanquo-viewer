<script>
    const urlParams = new URLSearchParams(window.location.search);
    let rawUrl = urlParams.get('src');
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');

    if (rawUrl) {
        // 1. Extract the File ID
        let fileId = "";
        if (rawUrl.includes("drive.google.com")) {
            const matches = rawUrl.match(/[-\w]{25,}/);
            if (matches) fileId = matches[0];
        } else {
            fileId = rawUrl; // Assume raw ID if no domain
        }

        if (fileId) {
            status.innerText = "Bypassing Google security check...";
            
            // 2. Use the 2026 direct usercontent domain with the 'confirm=t' bypass
            // This forces Google to skip the "Too large to scan" warning page.
            const directLink = `https://drive.usercontent.google.com/download?export=download&id=${fileId}&confirm=t`;
            
            viewer.src = directLink;

            viewer.addEventListener('progress', (event) => {
                const percent = Math.round(event.detail.totalProgress * 100);
                status.innerText = `Downloading: ${percent}%`;
            });

            viewer.addEventListener('load', () => {
                status.innerText = "Model Loaded";
                setTimeout(() => { status.style.opacity = '0'; }, 2000);
            });

            viewer.addEventListener('error', () => {
                status.innerText = "Error: File is private or link is broken.";
                status.style.color = "#ff3b30"; // Apple Red
            });
        }
    } else {
        status.innerText = "No model detected. Scan a Sanquo PDF.";
    }
</script>
