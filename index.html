<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanquo 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
        model-viewer { width: 100%; height: 100%; background-color: #fafafa; }
        #status { position: absolute; bottom: 20px; color: #888; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="status">Ready to load Sanquo model...</div>

    <model-viewer id="viewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate>
    </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('src');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        if (rawUrl) {
            status.innerText = "Processing link...";

            // MAGIC PART: Converts standard Google Drive links to Direct Download links
            if (rawUrl.includes("drive.google.com")) {
                const fileId = rawUrl.match(/[-\w]{25,}/);
                if (fileId) {
                    rawUrl = `https://docs.google.com/uc?export=download&id=${fileId[0]}`;
                }
            }

            status.innerText = "Downloading 3D Model...";
            viewer.src = rawUrl;

            // Update status when loaded
            viewer.addEventListener('load', () => {
                status.innerText = "Model Loaded Successfully";
                setTimeout(() => { status.style.opacity = '0'; }, 3000);
            });

            // Handle errors (like private files)
            viewer.addEventListener('error', (e) => {
                status.innerText = "Error: Make sure the Google Drive file is PUBLIC.";
                status.style.color = "red";
                console.error(e);
            });
        } else {
            status.innerText = "No model link found. Please scan a Sanquo PDF.";
        }
    </script>
</body>
</html>
